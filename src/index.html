<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>自動実行サンプル</title>
  <style>
    #status {
      margin: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div id="view"></div>

  <script>
    /**
     * 最新のメモを参照して分析を追加する
     */
    function generateNextAnalysis() {
      // 処理中マーク
      const viewEl = document.getElementById("view");
      viewEl.textContent = "処理中…";

      // 関数実行用のリクエスト
      const requestForFunc = {
        id: "getNewNotForNextMeeting"
      };

      google.script.run
        .withSuccessHandler(function (result) {
          console.log("success result:", result);

          if (typeof result !== "string") {
            viewEl.textContent =
              "結果が文字列で返ってきませんでした: " + String(result);
            return;
          }

          viewEl.innerHTML = result.replace(/\n/g, "<br>");
        })
        .withFailureHandler(function (err) {
          console.error("failure:", err);
          viewEl.textContent =
            "エラーが発生しました:\n" +
            (err && err.message ? err.message : JSON.stringify(err));
        })
        .abstractFunction(requestForFunc);
    };
  </script>
</body>

</html>
