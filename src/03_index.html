<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>次回面談時注意抽出</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 12px;
      font-size: 13px;
    }

    /* ===== メモセクション全体 ===== */
    #notes-section {
      margin-bottom: 16px;
    }

    /* ===== タブ一覧 ===== */
    #notes-tabs {
      display: flex;
      flex-wrap: wrap;
      flex-direction: row;
      /* 左から右へ並べる（新しいものが左） */
      gap: 4px;
      margin-bottom: 4px;
    }

    /* タブ基本スタイル（全タブ共通・幅均一） */
    .note-tab {
      flex: 0 0 auto;
      width: 72px;
      /* 全タブ同一幅 */
      padding: 4px 0;
      text-align: center;
      border: 1px solid #aaa;
      border-radius: 4px;
      cursor: pointer;
      background: #eee;
      font-size: 12px;
      color: #555;
      user-select: none;
      box-sizing: border-box;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* 選択中タブ */
    .note-tab.active {
      background: #fff;
      border-color: #444;
      color: #000;
      font-weight: bold;
    }

    /*
     * 今回新規生成したタブ専用スタイル。
     * 赤でハイライトし、未選択でも目立つようにする。
     * .active と併用される場合は border-color を上書き。
     */
    .note-tab.new-note {
      background: #fff0f0;
      border-color: #c00;
      color: #900;
      font-weight: bold;
    }

    .note-tab.new-note.active {
      background: #ffe0e0;
      border-color: #900;
      color: #600;
    }

    /* ===== タブのコンテンツ表示エリア ===== */
    #notes-content {
      display: none;
      /* 初期状態は非表示。タブクリックで開く */
      border: 1px solid #666;
      border-radius: 4px;
      padding: 10px 12px;
      background: #fff;
      min-height: 60px;
      font-size: 12px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: #222;
    }

    /* ===== 読み込み中・エラー表示 ===== */
    #notes-loading {
      color: #888;
      font-size: 12px;
      margin: 6px 0;
    }

    /* ===== 生成ボタン ===== */
    #generate-btn {
      display: block;
      width: 100%;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      border: 1px solid #888;
      border-radius: 4px;
      background: #fff;
      color: #222;
      margin-bottom: 14px;
      box-sizing: border-box;
    }

    #generate-btn:hover {
      background: #f0f0f0;
    }

    #generate-btn:disabled {
      color: #aaa;
      border-color: #ccc;
      cursor: default;
      background: #f9f9f9;
    }

    /* ===== 保存ステータス（生成ボタン下に小さく表示） ===== */
    #save-status {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      min-height: 16px;
    }

    #save-status.ok {
      color: #2a7a2a;
    }

    #save-status.err {
      color: #c00;
    }
  </style>
</head>

<body>

  <!-- メモタブ群とコンテンツエリアのコンテナ -->
  <div id="notes-section">
    <div id="notes-loading">既存メモを読み込み中…</div>
  </div>

  <!-- 生成ボタン：生成完了後は非表示になる -->
  <button id="generate-btn" onclick="generateNextAnalysis()">分析を生成</button>
  <!-- 自動保存の進捗表示 -->
  <div id="save-status"></div>



  <script>
    // eslint-disable-next-line
    var GAS_DATA = {
      existingNotes: <?!= JSON.stringify(existingNotes || []) ?>,
      errMsg: <?!= JSON.stringify(errMsg || null) ?>
  };

    function debugStatus(message) {
      const statusEl = document.getElementById("save-status");
      statusEl.className = "";
      statusEl.textContent = message;
    }

    var activeIndex = null;
    var notes = [];
    var tabElements = [];

    function renderTabs() {
      const section = document.getElementById("notes-section");
      const contentEl = document.getElementById("notes-content");

      var tabsEl = document.getElementById("notes-tabs");
      if (!tabsEl) {
        tabsEl = document.createElement("div");
        tabsEl.id = "notes-tabs";
        section.innerHTML = "";
        section.appendChild(tabsEl);
        section.appendChild(contentEl);
      }

      tabsEl.innerHTML = "";
      tabElements = [];

      notes.forEach(function (note, i) {
        const tab = document.createElement("div");
        tab.className = "note-tab" + (note.isNew ? " new-note" : "");

        const d = new Date(note.date);
        tab.textContent =
          d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate();

        if (activeIndex === i) tab.classList.add("active");

        tab.addEventListener("click", function () {
          if (activeIndex === i) {
            tab.classList.remove("active");
            contentEl.style.display = "none";
            activeIndex = null;
          } else {
            tabElements.forEach(function (t) { t.classList.remove("active"); });
            tab.classList.add("active");
            contentEl.textContent = note.content;
            contentEl.style.display = "block";
            activeIndex = i;
          }
        });

        tabsEl.appendChild(tab);
        tabElements.push(tab);
      });
    }

    // ====================================================
    //  起動時初期化
    // ====================================================
    (function () {
      const section = document.getElementById("notes-section");
      const contentEl = document.createElement("div");
      contentEl.id = "notes-content";
      section.appendChild(contentEl);

      // GAS側でエラーが発生していた場合はここで表示して終了
      if (GAS_DATA.errMsg) {
        section.innerHTML = '<div id="notes-loading" style="color:#c00;">メモの読み込みに失敗しました：' + GAS_DATA.errMsg + '</div>';
        section.appendChild(contentEl);
        return;
      }

      const rawNotes = GAS_DATA.existingNotes;

      if (!rawNotes || !Array.isArray(rawNotes) || rawNotes.length === 0) {
        section.innerHTML = '<div id="notes-loading">既存メモはありません。</div>';
        section.appendChild(contentEl);
        return;
      }

      notes = rawNotes.map(function (note) {
        return {
          date: new Date(note.date),
          content: note.content
        };
      });

      section.innerHTML = "";
      section.appendChild(contentEl);
      renderTabs();
    })();

    // ====================================================
    //  分析生成
    // ====================================================
    function generateNextAnalysis() {
      const btn = document.getElementById("generate-btn");
      const statusEl = document.getElementById("save-status");

      statusEl.className = "";
      statusEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "生成中…";

      google.script.run
        .withSuccessHandler(function (result) {
          if (typeof result !== "string") {
            btn.disabled = false;
            btn.textContent = "分析を生成";
            statusEl.className = "err";
            statusEl.textContent = "結果が不正な型です: " + String(result);
            return;
          }

          btn.style.display = "none";

          const newNote = {
            date: new Date().toISOString(),
            content: result,
            isNew: true
          };
          notes.unshift(newNote);

          activeIndex = 0;
          renderTabs();

          const contentEl = document.getElementById("notes-content");
          contentEl.textContent = result;
          contentEl.style.display = "block";

          autoSave(result);
        })
        .withFailureHandler(function (err) {
          btn.disabled = false;
          btn.textContent = "分析を生成";
          statusEl.className = "err";
          statusEl.textContent = "生成エラー: " + (err && err.message ? err.message : JSON.stringify(err));
        })
        .abstractFunction({ id: "genNewNoteForNextMeeting" });
    }

    // ====================================================
    //  自動保存
    // ====================================================
    function autoSave(content) {
      const statusEl = document.getElementById("save-status");

      statusEl.className = "";
      statusEl.textContent = "保存中…";

      google.script.run
        .withSuccessHandler(function () {
          statusEl.className = "ok";
          statusEl.textContent = "保存しました ✓";
        })
        .withFailureHandler(function (err) {
          statusEl.className = "err";
          statusEl.textContent = "保存に失敗しました: " + (err && err.message ? err.message : JSON.stringify(err));
        })
        .abstractFunction({
          id: "saveNewNote",
          context: {
            note: {
              date: new Date().toISOString(),
              content: content
            }
          }
        });
    }
  </script>
</body>

</html>
